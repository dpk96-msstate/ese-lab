<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SERA Lab</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1,
        h2,
        h3 {
            color: #1A2744;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: #fdfdfd;
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: auto;
            margin: 0;
        }

        button {
            padding: 10px 15px;
            background-color: #1A2744;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #FDBB30;
            color: #1A2744;
        }

        .btn-full {
            width: 100%;
            margin-top: 10px;
            font-size: 16px;
            padding: 12px;
        }

        .logout-btn {
            background-color: #dc3545;
            float: right;
        }

        .logout-btn:hover {
            background-color: #c82333;
            color: white;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
            margin-right: 5px;
        }

        .btn-danger {
            background-color: #dc3545;
        }

        .message {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        .error {
            color: #dc3545;
        }

        .success {
            color: #28a745;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 30px 0;
        }

        /* Tabs styling */
        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: none;
            color: #666;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            border-radius: 0;
        }

        .tab-btn.active {
            color: #1A2744;
            border-bottom: 2px solid #FDBB30;
            font-weight: bold;
        }

        /* Table styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
            color: #1A2744;
        }

        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="login-section">
            <img src="assets/sera logo horiz-transparent.svg" alt="SERA Lab"
                style="width: 100%; max-width: 300px; display: block; margin: 0 auto 20px;">
            <h2 style="text-align: center;">Admin Login</h2>
            <div class="form-group"><label>Email Address</label><input type="email" id="email"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password"></div>
            <button class="btn-full" onclick="window.handleLogin()">Sign In</button>
            <p id="login-message" class="message error"></p>
        </div>

        <div id="dashboard-section" class="hidden">
            <button class="logout-btn" onclick="window.handleLogout()">Logout</button>
            <h2>SERA Lab Content Manager</h2>

            <div class="tabs">
                <button class="tab-btn active" onclick="window.switchTab('pubs')">Publications</button>
                <button class="tab-btn" onclick="window.switchTab('news')">News</button>
                <button class="tab-btn" onclick="window.switchTab('members')">Members</button>
            </div>

            <div id="tab-pubs" class="tab-content">
                <div class="form-section">
                    <h3 id="pub-form-title">➕ Add Publication</h3>
                    <input type="hidden" id="pub-id">
                    <div class="form-group"><label>Paper Title</label><input type="text" id="pub-title"></div>
                    <div class="form-group"><label>Authors</label><input type="text" id="pub-authors"></div>
                    <div class="form-group"><label>Venue</label><input type="text" id="pub-venue"></div>
                    <div class="form-group"><label>Year</label><input type="number" id="pub-year" value="2025"></div>
                    <div style="display:flex; gap:10px;">
                        <button id="pub-submit-btn" class="btn-full" onclick="window.savePublication()">Publish</button>
                        <button id="pub-cancel-btn" class="btn-full btn-danger hidden"
                            onclick="window.resetForm('pub')">Cancel Edit</button>
                    </div>
                    <p id="pub-message" class="message"></p>
                </div>
                <h3>Current Publications</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Year</th>
                            <th>Title</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pubs-table-body">
                        <tr>
                            <td colspan="3">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="tab-news" class="tab-content hidden">
                <div class="form-section">
                    <h3 id="news-form-title">📰 Add News Update</h3>
                    <input type="hidden" id="news-id">
                    <div class="form-group"><label>Headline</label><input type="text" id="news-title"></div>
                    <div class="form-group"><label>Description</label><textarea id="news-desc" rows="3"></textarea>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;"><label>Month</label><input type="text" id="news-month">
                        </div>
                        <div class="form-group" style="flex: 1;"><label>Year</label><input type="number" id="news-year"
                                value="2025"></div>
                    </div>
                    <div class="form-group"><label>Tags (Comma separated)</label><input type="text" id="news-tags">
                    </div>
                    <div class="form-group checkbox-group"><input type="checkbox" id="news-featured"><label
                            for="news-featured" style="margin:0;">Featured News</label></div>
                    <div style="display:flex; gap:10px;">
                        <button id="news-submit-btn" class="btn-full" onclick="window.saveNews()">Publish</button>
                        <button id="news-cancel-btn" class="btn-full btn-danger hidden"
                            onclick="window.resetForm('news')">Cancel Edit</button>
                    </div>
                    <p id="news-message" class="message"></p>
                </div>
                <h3>Current News</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Headline</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="news-table-body">
                        <tr>
                            <td colspan="3">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="tab-members" class="tab-content hidden">
                <div class="form-section">
                    <h3 id="mem-form-title">👤 Add Lab Member</h3>
                    <input type="hidden" id="mem-id">
                    <div class="form-group"><label>Full Name</label><input type="text" id="mem-name"></div>
                    <div class="form-group"><label>Title (Optional)</label><input type="text" id="mem-title"></div>
                    <div class="form-group"><label>Affiliation / Short Bio</label><input type="text"
                            id="mem-affiliation"></div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="mem-category">
                            <option value="director">Director</option>
                            <option value="collaborator">Collaborator</option>
                            <option value="phd">Current PhD Student</option>
                            <option value="ms">Current MS Student</option>
                            <option value="alumni_phd">Alumni (PhD)</option>
                            <option value="alumni_ms">Alumni (MS)</option>
                            <option value="sig_coordinator">SIG Coordinator</option>
                            <option value="sig_member">SIG Member</option>
                        </select>
                    </div>
                    <div class="form-group"><label>LinkedIn URL (Optional)</label><input type="text" id="mem-linkedin">
                    </div>
                    <div class="form-group"><label>Profile Image (Leave blank to keep existing during
                            edit)</label><input type="file" id="mem-image" accept="image/*"></div>
                    <div style="display:flex; gap:10px;">
                        <button id="mem-submit-btn" class="btn-full" onclick="window.saveMember()">Add Member</button>
                        <button id="mem-cancel-btn" class="btn-full btn-danger hidden"
                            onclick="window.resetForm('mem')">Cancel Edit</button>
                    </div>
                    <p id="mem-message" class="message"></p>
                </div>
                <h3>Current Members</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="members-table-body">
                        <tr>
                            <td colspan="3">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // ==========================================
        // 1. SUPABASE CONFIGURATION
        // ==========================================
        const supabaseUrl = 'https://uozmlevtkfqskdgqxejw.supabase.co'; // e.g., 'https://xyz.supabase.co'
        const supabaseKey = 'sb_publishable_GS6J9I_G7vfn3mDExAEq1A_tGfctcjF';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Make supabase global so our table buttons can use it inside onclick attributes
        window.supabase = supabase;

        // ==========================================
        // 2. AUTH & TABS
        // ==========================================
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) { window.showDashboard(); window.loadAllData(); }
        });

        window.handleLogin = async function () {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('login-message');
            msg.innerText = "Logging in...";
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) msg.innerText = error.message;
            else { msg.innerText = ""; window.showDashboard(); window.loadAllData(); }
        };

        window.handleLogout = async function () {
            await supabase.auth.signOut();
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
        };

        window.showDashboard = function () {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
        };

        window.switchTab = function (tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            event.target.classList.add('active');
        };

        window.loadAllData = function () {
            window.fetchPublications();
            window.fetchNews();
            window.fetchMembers();
        };

        window.resetForm = function (prefix) {
            document.getElementById(`${prefix}-id`).value = '';
            document.getElementById(`${prefix}-form-title`).innerText = `➕ Add ${prefix.charAt(0).toUpperCase() + prefix.slice(1)}`;
            document.getElementById(`${prefix}-submit-btn`).innerText = 'Publish';
            document.getElementById(`${prefix}-cancel-btn`).classList.add('hidden');
            document.getElementById(`${prefix}-message`).innerText = '';

            // Clear all inputs in the form
            const form = document.getElementById(`tab-${prefix === 'pub' ? 'pubs' : prefix}`);
            form.querySelectorAll('input[type="text"], input[type="number"], textarea, input[type="file"]').forEach(i => i.value = '');
            form.querySelectorAll('input[type="checkbox"]').forEach(i => i.checked = false);
        };

        // ==========================================
        // 3. PUBLICATIONS CRUD
        // ==========================================
        window.fetchPublications = async function () {
            const { data } = await supabase.from('publications').select('*').order('year', { ascending: false });
            const tbody = document.getElementById('pubs-table-body');
            if (!data || data.length === 0) return tbody.innerHTML = '<tr><td colspan="3">No publications found.</td></tr>';

            // Save global list for editing
            window.pubsList = data;

            tbody.innerHTML = data.map(p => `
            <tr>
                <td>${p.year}</td>
                <td>${p.title.substring(0, 50)}...</td>
                <td>
                    <button class="btn-sm" onclick="window.editPub('${p.id}')">Edit</button>
                    <button class="btn-sm btn-danger" onclick="window.deleteRecord('publications', '${p.id}', window.fetchPublications)">Delete</button>
                </td>
            </tr>
        `).join('');
        };

        window.savePublication = async function () {
            const id = document.getElementById('pub-id').value;
            const payload = {
                title: document.getElementById('pub-title').value,
                authors: document.getElementById('pub-authors').value,
                venue: document.getElementById('pub-venue').value,
                year: parseInt(document.getElementById('pub-year').value)
            };
            const msg = document.getElementById('pub-message');
            if (!payload.title || !payload.authors) return msg.className = "message error", msg.innerText = "Title and Authors required.";

            msg.className = "message"; msg.innerText = "Saving...";

            const { error } = id
                ? await supabase.from('publications').update(payload).eq('id', id)
                : await supabase.from('publications').insert([payload]);

            if (error) { msg.className = "message error"; msg.innerText = error.message; }
            else {
                window.resetForm('pub');
                msg.className = "message success"; msg.innerText = "✅ Saved!";
                window.fetchPublications();
            }
        };

        window.editPub = function (id) {
            const p = window.pubsList.find(x => x.id === id);
            document.getElementById('pub-id').value = p.id;
            document.getElementById('pub-title').value = p.title;
            document.getElementById('pub-authors').value = p.authors;
            document.getElementById('pub-venue').value = p.venue;
            document.getElementById('pub-year').value = p.year;

            document.getElementById('pub-form-title').innerText = "✏️ Edit Publication";
            document.getElementById('pub-submit-btn').innerText = "Update Publication";
            document.getElementById('pub-cancel-btn').classList.remove('hidden');
            document.getElementById('pub-title').scrollIntoView({ behavior: 'smooth' });
        };

        // ==========================================
        // 4. NEWS CRUD
        // ==========================================
        window.fetchNews = async function () {
            const { data } = await supabase.from('news').select('*').order('year', { ascending: false });
            const tbody = document.getElementById('news-table-body');
            if (!data || data.length === 0) return tbody.innerHTML = '<tr><td colspan="3">No news found.</td></tr>';

            window.newsList = data;

            tbody.innerHTML = data.map(n => `
            <tr>
                <td>${n.month} ${n.year}</td>
                <td>${n.title}</td>
                <td>
                    <button class="btn-sm" onclick="window.editNews('${n.id}')">Edit</button>
                    <button class="btn-sm btn-danger" onclick="window.deleteRecord('news', '${n.id}', window.fetchNews)">Delete</button>
                </td>
            </tr>
        `).join('');
        };

        window.saveNews = async function () {
            const id = document.getElementById('news-id').value;
            const tagsRaw = document.getElementById('news-tags').value;
            const payload = {
                title: document.getElementById('news-title').value,
                description: document.getElementById('news-desc').value,
                month: document.getElementById('news-month').value,
                year: parseInt(document.getElementById('news-year').value),
                is_featured: document.getElementById('news-featured').checked,
                tags: tagsRaw ? tagsRaw.split(',').map(tag => tag.trim()).filter(tag => tag !== "") : []
            };
            const msg = document.getElementById('news-message');
            if (!payload.title) return msg.className = "message error", msg.innerText = "Headline required.";

            msg.className = "message"; msg.innerText = "Saving...";

            const { error } = id
                ? await supabase.from('news').update(payload).eq('id', id)
                : await supabase.from('news').insert([payload]);

            if (error) { msg.className = "message error"; msg.innerText = error.message; }
            else {
                window.resetForm('news');
                msg.className = "message success"; msg.innerText = "✅ Saved!";
                window.fetchNews();
            }
        };

        window.editNews = function (id) {
            const n = window.newsList.find(x => x.id === id);
            document.getElementById('news-id').value = n.id;
            document.getElementById('news-title').value = n.title;
            document.getElementById('news-desc').value = n.description || '';
            document.getElementById('news-month').value = n.month || '';
            document.getElementById('news-year').value = n.year;
            document.getElementById('news-tags').value = (n.tags || []).join(', ');
            document.getElementById('news-featured').checked = n.is_featured;

            document.getElementById('news-form-title').innerText = "✏️ Edit News";
            document.getElementById('news-submit-btn').innerText = "Update News";
            document.getElementById('news-cancel-btn').classList.remove('hidden');
            document.getElementById('news-title').scrollIntoView({ behavior: 'smooth' });
        };

        // ==========================================
        // 5. MEMBERS CRUD
        // ==========================================
        window.fetchMembers = async function () {
            const { data } = await supabase.from('members').select('*').order('created_at', { ascending: true });
            const tbody = document.getElementById('members-table-body');
            if (!data || data.length === 0) return tbody.innerHTML = '<tr><td colspan="3">No members found.</td></tr>';

            window.membersList = data;

            tbody.innerHTML = data.map(m => `
            <tr>
                <td>${m.name}</td>
                <td>${m.role_category}</td>
                <td>
                    <button class="btn-sm" onclick="window.editMember('${m.id}')">Edit</button>
                    <button class="btn-sm btn-danger" onclick="window.deleteRecord('members', '${m.id}', window.fetchMembers)">Delete</button>
                </td>
            </tr>
        `).join('');
        };

        window.saveMember = async function () {
            const id = document.getElementById('mem-id').value;
            const msg = document.getElementById('mem-message');
            const fileInput = document.getElementById('mem-image');

            const payload = {
                name: document.getElementById('mem-name').value,
                title: document.getElementById('mem-title').value,
                affiliation: document.getElementById('mem-affiliation').value,
                role_category: document.getElementById('mem-category').value,
                linkedin_url: document.getElementById('mem-linkedin').value
            };

            if (!payload.name) return msg.className = "message error", msg.innerText = "Name is required.";
            msg.className = "message"; msg.innerText = "Saving member...";

            // Handle Image if a new one is selected
            if (fileInput.files.length > 0) {
                msg.innerText = "Uploading image...";
                const file = fileInput.files[0];
                const fileName = `${Date.now()}-${payload.name.replace(/\s+/g, '').toLowerCase()}.${file.name.split('.').pop()}`;

                const { error: uploadError } = await supabase.storage.from('profile-images').upload(fileName, file);
                if (uploadError) return msg.className = "message error", msg.innerText = "Upload failed: " + uploadError.message;

                const { data: { publicUrl } } = supabase.storage.from('profile-images').getPublicUrl(fileName);
                payload.image_url = publicUrl;
            }

            const { error } = id
                ? await supabase.from('members').update(payload).eq('id', id)
                : await supabase.from('members').insert([payload]);

            if (error) { msg.className = "message error"; msg.innerText = error.message; }
            else {
                window.resetForm('mem');
                msg.className = "message success"; msg.innerText = "✅ Saved!";
                window.fetchMembers();
            }
        };

        window.editMember = function (id) {
            const m = window.membersList.find(x => x.id === id);
            document.getElementById('mem-id').value = m.id;
            document.getElementById('mem-name').value = m.name;
            document.getElementById('mem-title').value = m.title || '';
            document.getElementById('mem-affiliation').value = m.affiliation || '';
            document.getElementById('mem-category').value = m.role_category;
            document.getElementById('mem-linkedin').value = m.linkedin_url || '';

            document.getElementById('mem-form-title').innerText = "✏️ Edit Member";
            document.getElementById('mem-submit-btn').innerText = "Update Member";
            document.getElementById('mem-cancel-btn').classList.remove('hidden');
            document.getElementById('mem-name').scrollIntoView({ behavior: 'smooth' });
        };

        // ==========================================
        // 6. GLOBAL DELETE FUNCTION
        // ==========================================
        window.deleteRecord = async function (table, id, refreshCallback) {
            if (!confirm("Are you sure you want to delete this? This cannot be undone.")) return;

            const { error } = await window.supabase.from(table).delete().eq('id', id);
            if (error) alert("Error deleting: " + error.message);
            else refreshCallback(); // Refresh the table
        };

    </script>
</body>

</html>
